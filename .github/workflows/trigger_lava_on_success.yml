name: trigger_lava_on_success

on:
  workflow_run:
    workflows: ["pre_merge_build"]
    types:
      - completed
    branches:
      - temp

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  prepare_matrix:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}

    steps:
      - name: Download test matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: test-matrix
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ NEW: download all presigned URL artifacts from the triggering workflow
      - name: Download presigned URL artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: presigned_url_*.txt
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: presigned_urls

      # ✅ NEW: re-upload for the reusable workflow run
      - name: Re-upload presigned URL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: presigned_urls
          path: presigned_urls

      - name: Read matrix JSON
        id: matrix
        shell: bash
        run: |
          test -f test_matrix.json
          MATRIX=$(cat test_matrix.json)
          echo "test_matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  trigger_lava:
    needs: prepare_matrix
    uses: Audioreach/audioreach-workflows/.github/workflows/test.yml@temp
    secrets: inherit
    with:
      build_matrix: ${{ needs.prepare_matrix.outputs.test_matrix }}
