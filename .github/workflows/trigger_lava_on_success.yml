name: trigger_lava_on_success

on:
  workflow_run:
    workflows: ["pre_merge_build"]
    types:
      - completed
    branches:
      - njetha-test

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  prepare_matrix:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.matrix.outputs.test_matrix }}
      build_url: ${{ steps.read_url.outputs.build_url }}   # ✅ expose URL

    steps:
      - name: Download test matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: test-matrix
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download presigned URL artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: presigned_url_*.txt
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: presigned_urls
          merge-multiple: true

      # ✅ REQUIRED: read URL from artifact folder
      - name: Read presigned URL
        id: read_url
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const baseDir = 'presigned_urls'
            const fileName = fs.readdirSync(baseDir)[0]
            console.log('artifactDir contents:', fileName)
            console.log('artifactDir contents_2:', baseDir)
            const url = fs.readFileSync(path.join(baseDir, fileName), 'utf8').trim()
            console.log(`Presigned URL: ${url}`)
            core.setOutput('build_url', url)

      - name: Re-upload presigned URL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: presigned_urls
          path: presigned_urls

      - name: Read matrix JSON
        id: matrix
        shell: bash
        run: |
          test -f test_matrix.json
          MATRIX=$(cat test_matrix.json)
          echo "test_matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  trigger_lava:
    needs: prepare_matrix
    uses: Audioreach/audioreach-workflows/.github/workflows/test.yml@temp
    secrets: inherit
    with:
      build_matrix: ${{ needs.prepare_matrix.outputs.test_matrix }}
